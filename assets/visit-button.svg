<svg xmlns="http://www.w3.org/2000/svg" width="700" height="120" viewBox="0 0 700 120">
  <defs>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f260"/>
      <stop offset="25%" stop-color="#0575e6"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="75%" stop-color="#0575e6"/>
      <stop offset="100%" stop-color="#00f260"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      <animate attributeName="x1" values="-100%;100%" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;200%" dur="2.5s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#0575e6" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.92;
        transform: scale(1.015);
      }
    }

    @keyframes borderPulse {
      0%, 100% { stroke-opacity: 0.4; stroke-width: 2; }
      50% { stroke-opacity: 1; stroke-width: 3.5; }
    }

    @keyframes textGlow {
      0%, 100% { filter: url(#glow); }
      50% { filter: url(#outerGlow); }
    }

    @keyframes arrowBounce {
      0%, 100% { transform: translateX(0px); }
      50% { transform: translateX(8px); }
    }

    .btn-group {
      animation: pulse 2s ease-in-out infinite;
      transform-origin: center center;
    }

    .btn-border {
      animation: borderPulse 2s ease-in-out infinite;
    }

    .btn-text {
      animation: textGlow 2s ease-in-out infinite;
    }

    .arrow {
      animation: arrowBounce 1s ease-in-out infinite;
    }

    .ring1 {
      animation: pulse 2s ease-in-out infinite;
      opacity: 0.15;
    }

    .ring2 {
      animation: pulse 2s ease-in-out 0.3s infinite;
      opacity: 0.08;
    }
  </style>

  <!-- Outer glow rings -->
  <rect class="ring2" x="2" y="2" width="696" height="116" rx="58"
        fill="none" stroke="#a855f7" stroke-width="2"/>
  <rect class="ring1" x="6" y="6" width="688" height="108" rx="54"
        fill="none" stroke="#0575e6" stroke-width="2"/>

  <g class="btn-group">
    <!-- Main button background -->
    <rect x="14" y="14" width="672" height="92" rx="46"
          fill="url(#btnGrad)"/>

    <!-- Shimmer overlay -->
    <rect x="14" y="14" width="672" height="92" rx="46"
          fill="url(#shimmer)"/>

    <!-- Animated border -->
    <rect class="btn-border" x="14" y="14" width="672" height="92" rx="46"
          fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>

    <!-- Globe icon -->
    <circle cx="100" cy="60" r="18" fill="none" stroke="white" stroke-width="2.5" opacity="0.95"/>
    <ellipse cx="100" cy="60" rx="8" ry="18" fill="none" stroke="white" stroke-width="1.8" opacity="0.8"/>
    <line x1="82" y1="60" x2="118" y2="60" stroke="white" stroke-width="1.8" opacity="0.8"/>
    <line x1="100" y1="42" x2="100" y2="78" stroke="white" stroke-width="1.8" opacity="0.8"/>

    <!-- Main text -->
    <text class="btn-text" x="310" y="55" text-anchor="middle"
          fill="white" font-size="28" font-weight="bold"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          letter-spacing="1">
      VISIT LIHKA GAMES
    </text>

    <!-- Subtitle -->
    <text x="310" y="78" text-anchor="middle"
          fill="rgba(255,255,255,0.85)" font-size="13"
          font-family="'Segoe UI', Arial, sans-serif"
          letter-spacing="2">
      TAP TO EXPLORE
    </text>

    <!-- Arrow -->
    <g class="arrow">
      <polygon points="620,50 640,60 620,70" fill="white" opacity="0.95"/>
      <polygon points="600,53 618,60 600,67" fill="white" opacity="0.5"/>
      <polygon points="583,55 598,60 583,65" fill="white" opacity="0.25"/>
    </g>
  </g>
</svg>