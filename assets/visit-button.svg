<svg xmlns="http://www.w3.org/2000/svg" width="700" height="120" viewBox="-20 -20 740 160" overflow="visible">
  <defs>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f260"/>
      <stop offset="25%" stop-color="#0575e6"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="75%" stop-color="#0575e6"/>
      <stop offset="100%" stop-color="#00f260"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="shimmer" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      <animate attributeName="x1" values="-100%;100%" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;200%" dur="2.5s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#0575e6" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="btnShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feFlood flood-color="#0575e6" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feOffset dx="0" dy="4" result="offsetShadow"/>
      <feMerge>
        <feMergeNode in="offsetShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.92; }
    }

    @keyframes borderPulse {
      0%, 100% { stroke-opacity: 0.4; stroke-width: 2; }
      50% { stroke-opacity: 1; stroke-width: 3; }
    }

    @keyframes textGlow {
      0%, 100% { filter: url(#glow); }
      50% { filter: url(#outerGlow); }
    }

    @keyframes arrowBounce {
      0%, 100% { transform: translateX(0px); }
      50% { transform: translateX(6px); }
    }

    @keyframes ringPulse1 {
      0%, 100% { opacity: 0.15; stroke-width: 2; }
      50% { opacity: 0.35; stroke-width: 3; }
    }

    @keyframes ringPulse2 {
      0%, 100% { opacity: 0.08; stroke-width: 2; }
      50% { opacity: 0.2; stroke-width: 2.5; }
    }

    .btn-group {
      animation: pulse 2s ease-in-out infinite;
      filter: url(#btnShadow);
    }

    .btn-border {
      animation: borderPulse 2s ease-in-out infinite;
    }

    .btn-text {
      animation: textGlow 2s ease-in-out infinite;
    }

    .arrow {
      animation: arrowBounce 1s ease-in-out infinite;
    }

    .ring1 {
      animation: ringPulse1 2s ease-in-out infinite;
    }

    .ring2 {
      animation: ringPulse2 2s ease-in-out 0.3s infinite;
    }
  </style>

  <!-- Outer glow rings with safe insets -->
  <rect class="ring2" x="4" y="4" width="692" height="112" rx="56"
        fill="none" stroke="#a855f7" stroke-width="2"/>
  <rect class="ring1" x="8" y="8" width="684" height="104" rx="52"
        fill="none" stroke="#0575e6" stroke-width="2"/>

  <g class="btn-group">
    <!-- Main button background -->
    <rect x="18" y="16" width="664" height="88" rx="44"
          fill="url(#btnGrad)"/>

    <!-- Shimmer overlay -->
    <rect x="18" y="16" width="664" height="88" rx="44"
          fill="url(#shimmer)"/>

    <!-- Animated border -->
    <rect class="btn-border" x="18" y="16" width="664" height="88" rx="44"
          fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>

    <!-- Globe icon – shifted inward -->
    <circle cx="95" cy="60" r="16" fill="none" stroke="white" stroke-width="2.2" opacity="0.95"/>
    <ellipse cx="95" cy="60" rx="7" ry="16" fill="none" stroke="white" stroke-width="1.6" opacity="0.8"/>
    <line x1="79" y1="60" x2="111" y2="60" stroke="white" stroke-width="1.6" opacity="0.8"/>
    <line x1="95" y1="44" x2="95" y2="76" stroke="white" stroke-width="1.6" opacity="0.8"/>

    <!-- Main text – centered in safe area -->
    <text class="btn-text" x="330" y="54" text-anchor="middle"
          fill="white" font-size="26" font-weight="bold"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          letter-spacing="1">
      VISIT LIHKA GAMES
    </text>

    <!-- Subtitle -->
    <text x="330" y="76" text-anchor="middle"
          fill="rgba(255,255,255,0.85)" font-size="12"
          font-family="'Segoe UI', Arial, sans-serif"
          letter-spacing="2">
      TAP TO EXPLORE
    </text>

    <!-- Arrow – pulled inward from edge -->
    <g class="arrow">
      <polygon points="608,50 626,60 608,70" fill="white" opacity="0.95"/>
      <polygon points="590,53 606,60 590,67" fill="white" opacity="0.5"/>
      <polygon points="575,55 588,60 575,65" fill="white" opacity="0.25"/>
    </g>
  </g>
</svg>